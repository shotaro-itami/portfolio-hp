server {
    listen 80;
    listen [::]:80;
    server_name itamishotaro.com www.itamishotaro.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name itamishotaro.com www.itamishotaro.com;

    root /var/www/html;
    index index.html;

    ssl_certificate     /etc/ssl/cloudflare/origin-cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /books {
        return 301 /books/;
    }

    location /books/assets/ {
        try_files $uri =404;
    }

    location = /books/api/admin/session {
        limit_req zone=books_admin_session burst=5 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/reading-time-tracker/reading-time-tracker.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /books/api/ {
        limit_req zone=books_api burst=20 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/reading-time-tracker/reading-time-tracker.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /books/ {
        try_files $uri $uri/ /books/index.html;
    }
}
